<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;background:#0D1B4B;color:#fff;padding:54px 24px;text-align:center;overflow:hidden">
  <div style="position:absolute;top:14px;left:20px;width:120px;height:74px;background-image:radial-gradient(rgba(120,150,255,.5) 1.6px,transparent 1.6px);background-size:14px 14px;opacity:.55"></div>
  <div style="position:absolute;bottom:14px;right:20px;width:120px;height:74px;background-image:radial-gradient(rgba(120,150,255,.5) 1.6px,transparent 1.6px);background-size:14px 14px;opacity:.55"></div>
  <div style="position:absolute;top:24px;right:46px;width:36px;height:5px;border-radius:3px;background:#F5A800;transform:rotate(-42deg)"></div>
  <div style="position:absolute;top:46px;right:78px;width:26px;height:5px;border-radius:3px;background:#00B4B4;transform:rotate(-42deg)"></div>
  <div style="position:absolute;bottom:28px;left:48px;width:30px;height:5px;border-radius:3px;background:#7A5CFF;transform:rotate(-42deg)"></div>
  <div style="position:absolute;bottom:50px;left:82px;width:24px;height:5px;border-radius:3px;background:#1A3A8F;transform:rotate(-42deg)"></div>
  <h2 style="margin:0;font-family:'Montserrat',sans-serif;font-weight:800;font-size:clamp(23px,3.6vw,38px);letter-spacing:1px;text-transform:uppercase;position:relative">{{ title }}</h2>
  <div style="width:74px;height:4px;background:#F5A800;border-radius:3px;margin:16px auto 0"></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:960,&quot;height&quot;:160},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;TÍTULO DE SECCIÓN&quot;,&quot;tsType&quot;:&quot;string&quot;}}"></script>
</body>
</html>
