<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<a href="{{ href }}" target="{{ target }}" onClick="{{ onClick }}" style="display:flex;align-items:center;gap:15px;padding:16px 22px;border-radius:50px;background:linear-gradient(135deg,#0D1B4B 0%,#1A3A8F 100%);color:#fff;text-decoration:none;cursor:pointer;min-height:74px;box-shadow:0 10px 24px rgba(13,27,75,.22);transition:transform .18s ease,box-shadow .18s ease;position:relative;overflow:hidden" style-hover="transform:translateY(-3px);box-shadow:0 18px 36px rgba(13,27,75,.34)">
  <span style="{{ stripeStyle }}"></span>
  <span style="{{ iconWrapStyle }}"><i class="{{ icon }}" style="{{ iconStyle }}"></i></span>
  <span style="display:flex;flex-direction:column;gap:3px;flex:1;min-width:0">
    <span style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:14px;letter-spacing:.4px;text-transform:uppercase;line-height:1.25">{{ title }}</span>
    <span style="font-family:'Open Sans',sans-serif;font-size:12.5px;color:rgba(255,255,255,.82);line-height:1.45">{{ text }}</span>
  </span>
  <i class="fa-solid fa-chevron-right" style="font-size:15px;color:#F5A800;flex:none"></i>
</a>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:380,&quot;height&quot;:92},&quot;icon&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;fa-solid fa-file-lines&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;TÍTULO&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;text&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Descripción breve de la acción.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#00B4B4&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;href&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;target&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;onClick&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const accent = this.props.accent || '#F5A800';
    return {
      icon: this.props.icon || 'fa-solid fa-circle-chevron-right',
      title: this.props.title || '',
      text: this.props.text || '',
      href: this.props.href || undefined,
      target: this.props.target || undefined,
      onClick: this.props.onClick,
      iconStyle: { color: accent, fontSize: '19px' },
      iconWrapStyle: {
        flex: 'none', width: '50px', height: '50px', borderRadius: '50%',
        background: 'rgba(255,255,255,.13)', display: 'flex',
        alignItems: 'center', justifyContent: 'center',
        boxShadow: 'inset 0 0 0 1.5px ' + accent + '55'
      },
      stripeStyle: {
        position: 'absolute', left: 0, top: 0, bottom: 0, width: '5px', background: accent
      }
    };
  }
}
</script>
</body>
</html>
